name: Keep Railway Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # jalan tiap 15 menit
  workflow_dispatch:          # bisa dijalankan manual dari GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /ping endpoint
        run: curl -s https://pixeldev-production.up.railway.app/ping

      - name: Trigger /send email
        run: |
          curl -s -X POST https://pixeldev-production.up.railway.app/send \
          -H "Content-Type: application/json" \
          -d '{"name":"Bot","email":"bot@ping.com","message":"Ping test"}'